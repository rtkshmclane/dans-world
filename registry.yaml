# Dan's World App Registry
# This is the single source of truth for all apps and demos.
# Admin reads this at startup. Health checks, log viewer, and status page
# all iterate over this file dynamically.
#
# To add a new app:
#   1. Add an entry below
#   2. Add the app's service to docker-compose.yml
#   3. Add an nginx location block in gateway/conf.d/30-apps.conf
#   4. Add a Dockerfile to the app's source directory
#   See CONTRIBUTING.md for the full walkthrough.

apps:
  - id: ticketmaker
    name: Ticketmaker
    description: "Ticket analysis and viewer"
    url: /apps/ticketmaker/
    icon: ticket
    groups: [analytics, admin]
    author: Sam
    port: 5000
    health: /
    memory: 512m
    source:
      repo: rtkshmclane/CTOWorkspace
      path: 02_R_and_D/ticketmaker
      local: ${TICKETMAKER_PATH}
    container: dw-ticketmaker

  - id: detections
    name: Detection Catalog
    description: "2,496 detections with MITRE ATT&CK mappings"
    url: /apps/detections/
    icon: shield
    groups: [analytics, admin]
    author: Sam
    port: 5555
    health: /
    memory: 512m
    source:
      repo: rtkshmclane/CTOWorkspace
      path: 02_R_and_D/detection_catalog
      local: ${DETECTION_CATALOG_PATH}
    container: dw-detections

  - id: adoption
    name: Integration Adoption
    description: "Adoption analytics across 14,507 customers"
    url: /apps/adoption/
    icon: chart
    groups: [analytics, admin]
    author: Sam
    port: 8501
    health: /apps/adoption/
    memory: 1g
    source:
      repo: rtkshmclane/CTOWorkspace
      path: 03_Product/integration_adoption/analytics
      local: ${INTEGRATION_ADOPTION_PATH}
    container: dw-adoption
    websocket: true

  - id: catalog
    name: Integration Catalog
    description: "Integration battle cards and competitive intel"
    url: /apps/catalog/
    icon: catalog
    groups: [analytics, admin]
    author: Sam
    port: 5001
    health: /api/integrations
    memory: 512m
    source:
      repo: rtkshmclane/CTOWorkspace
      path: 03_Product/integration_catalog/dashboard
      local: ${INTEGRATION_CATALOG_PATH}
    container: dw-catalog
    depends_on: [detections, adoption]

  - id: cloud-live
    name: Aurora Cloud Live
    description: "Cloud security dashboard (Wiz integration)"
    url: /apps/cloud-live/
    icon: cloud
    groups: [engineering, admin]
    author: Sam
    port: 5004
    health: /
    memory: 512m
    source:
      repo: rtkshmclane/CTOWorkspace
      path: 02_R_and_D/AW_Point_Products_Demo/aw_managed_cloud_live
      local: ${CLOUD_LIVE_PATH}
    container: dw-cloud-live

  - id: network-graph
    name: Network Graph Playground
    description: "Entity relationship graphs from tickets and cases"
    url: /apps/network-graph/
    icon: graph
    groups: [analytics, admin]
    author: Sam
    port: 3334
    health: /
    memory: 256m
    source:
      repo: rtkshmclane/CTOWorkspace
      path: 02_R_and_D/network_graph_playground
      local: ${NETWORK_GRAPH_PATH}
    container: dw-network-graph

  - id: okta-is
    name: Okta Identity Inspector
    description: "Decode JWT claims from Okta/Prisma ZTNA for authorization planning"
    url: /apps/okta-is/
    icon: shield
    groups: [analytics, admin]
    author: Sam
    port: 5005
    health: /health
    memory: 256m
    source:
      builtin: true
    container: dw-okta-is

  - id: analytic-stories
    name: Analytic Stories
    description: "Attack chains and detection coverage mapped to MITRE ATT&CK"
    url: /apps/analytic-stories/
    icon: shield
    groups: [analytics, admin]
    author: Yeti
    port: 8089
    health: /api/v1/stats
    memory: 512m
    source:
      repo: rtkshmclane/CTOWorkspace
      path: Collaborators/BradB/idr/detection_coe/poc/analytic_stories
      local: ${ANALYTIC_STORIES_PATH}
    container: dw-analytic-stories

  - id: churn-explorer
    name: Churn Explorer
    description: "Q3'26 churn analysis -- tickets, ops, signals, competitor intel"
    url: /demos/churn-explorer/
    icon: churn
    groups: [analytics, admin]
    author: Sam
    source:
      static: true

