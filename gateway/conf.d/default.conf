# Dan's World of AI Magic -- nginx gateway configuration

# Upstream definitions
upstream admin_backend {
    server admin:5050;
}

upstream app_ticketmaker {
    server ticketmaker:5000;
}

upstream app_detections {
    server detection-catalog:5555;
}

upstream app_adoption {
    server integration-adoption:8501;
}

upstream app_catalog_api {
    server integration-catalog:5001;
}

upstream app_cloud_live {
    server cloud-live:5004;
}

upstream app_network_graph {
    server network-graph:3334;
}

upstream app_okta_is {
    server okta-is:5005;
}

upstream app_analytic_stories {
    server analytic-stories:8089;
}

upstream app_reports {
    server reports:5010;
}

# Custom log format with authenticated user
log_format dw_access '$remote_addr - $upstream_http_x_auth_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent"';
access_log /var/log/nginx/access.log dw_access;

# Rate limiting zone for login
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    listen 443 ssl;

    ssl_certificate /etc/nginx/ssl/octo.crt;
    ssl_certificate_key /etc/nginx/ssl/octo.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect HTTP to HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    server_name _;

    client_max_body_size 50m;

    # ---------------------------------------------------------------
    # Internal auth subrequest -- called before every protected route
    # ---------------------------------------------------------------
    location = /_auth {
        internal;
        proxy_method GET;
        proxy_pass http://admin_backend/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Transfer-Encoding "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
    }

    # Internal subrequest for drop zone access check
    location = /_auth_dropzone {
        internal;
        proxy_method GET;
        proxy_pass http://admin_backend/auth/validate-dropzone;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Transfer-Encoding "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
    }

    # ---------------------------------------------------------------
    # Auth endpoints (public -- no auth_request here)
    # ---------------------------------------------------------------
    location /auth/ {
        proxy_pass http://admin_backend/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limit login attempts
        location /auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://admin_backend/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Auth static assets (public)
    location /static/ {
        proxy_pass http://admin_backend/static/;
        proxy_set_header Host $host;
    }

    # ---------------------------------------------------------------
    # Landing page (auth required)
    # ---------------------------------------------------------------
    location = / {
        auth_request /_auth;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        auth_request_set $auth_groups $upstream_http_x_auth_groups;

        proxy_pass http://admin_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Auth-Groups $auth_groups;
    }

    # ---------------------------------------------------------------
    # Shared Reports (auth required, all users)
    # ---------------------------------------------------------------
    location /reports {
        auth_request /_auth;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        auth_request_set $auth_groups $upstream_http_x_auth_groups;

        proxy_pass http://app_reports/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Auth-Groups $auth_groups;
        proxy_set_header X-Script-Name /reports;
    }

    location /apps/reports/ {
        auth_request /_auth;
        auth_request_set $auth_user $upstream_http_x_auth_user;

        proxy_pass http://app_reports/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Script-Name /apps/reports;
    }

    # ---------------------------------------------------------------
    # Admin UI (auth required, admin group)
    # ---------------------------------------------------------------
    # Terminal WebSocket (must be before /admin/ catch-all)
    location = /admin/terminal/ws {
        auth_request /_auth;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        auth_request_set $auth_groups $upstream_http_x_auth_groups;

        proxy_pass http://admin_backend/admin/terminal/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Auth-Groups $auth_groups;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Log viewer SSE stream (must be before /admin/ catch-all)
    location = /admin/logs/stream {
        auth_request /_auth;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        auth_request_set $auth_groups $upstream_http_x_auth_groups;

        proxy_pass http://admin_backend/admin/logs/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Auth-Groups $auth_groups;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # Terminal page
    location = /admin/terminal {
        auth_request /_auth;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        auth_request_set $auth_groups $upstream_http_x_auth_groups;

        proxy_pass http://admin_backend/admin/terminal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Auth-Groups $auth_groups;
    }

    location /admin/ {
        auth_request /_auth;
        auth_request_set $auth_user $upstream_http_x_auth_user;
        auth_request_set $auth_groups $upstream_http_x_auth_groups;

        proxy_pass http://admin_backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Auth-Groups $auth_groups;
    }

    # ---------------------------------------------------------------
    # Python apps (auth required)
    # ---------------------------------------------------------------

    # Ticketmaker
    location /apps/ticketmaker/ {
        auth_request /_auth;
        proxy_pass http://app_ticketmaker/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /apps/ticketmaker;
    }

    # Detection Catalog
    location /apps/detections/ {
        auth_request /_auth;
        proxy_pass http://app_detections/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /apps/detections;
    }

    # Integration Adoption (Streamlit)
    location /apps/adoption/ {
        auth_request /_auth;
        proxy_pass http://app_adoption/apps/adoption/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Streamlit WebSocket and internal endpoints
    location /apps/adoption/_stcore/ {
        auth_request /_auth;
        proxy_pass http://app_adoption/apps/adoption/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /apps/adoption/stream {
        auth_request /_auth;
        proxy_pass http://app_adoption/apps/adoption/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Integration Catalog API
    location /apps/catalog/api/ {
        auth_request /_auth;
        proxy_pass http://app_catalog_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Integration Catalog Frontend (static Vite build served by nginx)
    location /apps/catalog/ {
        auth_request /_auth;
        alias /srv/catalog-frontend/;
        try_files $uri $uri/ /apps/catalog/index.html;
    }

    # Okta Identity Inspector -- forward ALL original headers including ZTNA JWT
    location /apps/okta-is/ {
        auth_request /_auth;
        proxy_pass http://app_okta_is/;
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /apps/okta-is;
        # Explicitly forward auth headers that Prisma/Okta ZTNA may set
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Jwt-Assertion $http_x_jwt_assertion;
        proxy_set_header X-User-Token $http_x_user_token;
        proxy_set_header X-Id-Token $http_x_id_token;
        proxy_set_header X-Access-Token $http_x_access_token;
        proxy_set_header X-Forwarded-Access-Token $http_x_forwarded_access_token;
        proxy_set_header X-Prisma-Access-Token $http_x_prisma_access_token;
        proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header Cookie $http_cookie;
    }

    # Analytic Stories (Detection COE)
    location /apps/analytic-stories/ {
        auth_request /_auth;
        proxy_pass http://app_analytic_stories/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /apps/analytic-stories;
    }

    # Network Graph Playground
    location /apps/network-graph/ {
        auth_request /_auth;
        proxy_pass http://app_network_graph/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /apps/network-graph;
    }

    # Aurora Cloud Live
    location /apps/cloud-live/ {
        auth_request /_auth;
        proxy_pass http://app_cloud_live/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /apps/cloud-live;
    }

    # ---------------------------------------------------------------
    # Static demo sites (auth required, served directly by nginx)
    # ---------------------------------------------------------------
    location /demos/point-products/ {
        auth_request /_auth;
        alias /srv/static/AW_Point_Products_Demo/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /demos/rsac-v3/ {
        auth_request /_auth;
        alias /srv/static/rsac_agentic_demo_v3/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /demos/rsac-wherewolf/ {
        auth_request /_auth;
        alias /srv/static/rsac_demo_wherewolf/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /demos/compliance/ {
        auth_request /_auth;
        alias /srv/static/compliance_reporting/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /demos/churn-explorer/ {
        auth_request /_auth;
        alias /srv/static/churn_explorer/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /demos/command-centre-ng/ {
        auth_request /_auth;
        alias /srv/static/command_centre_ng/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /demos/customer-portal/ {
        auth_request /_auth;
        alias /srv/static/AW_Point_Products_Demo/customer_portal/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /apps/integration-explorer/ {
        auth_request /_auth;
        alias /srv/static/integration-explorer/;
        index index.html;
        try_files $uri $uri/ $uri/index.html =404;
    }

    # ---------------------------------------------------------------
    # HTML Drop Zone (public or auth based on metadata)
    # ---------------------------------------------------------------
    location /d/ {
        auth_request /_auth_dropzone;
        alias /srv/dropzone/;
        default_type text/html;
        try_files $uri =404;
    }

    # ---------------------------------------------------------------
    # Error pages
    # ---------------------------------------------------------------
    error_page 401 = @login_redirect;
    location @login_redirect {
        return 302 /auth/login?next=$request_uri;
    }

    error_page 403 /403.html;
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
